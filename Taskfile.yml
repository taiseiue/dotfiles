version: "3"

tasks:
  update:
    cmds:
      - nix flake update --flake ./ && git commit -am "Update flake lock" && git push
  switch:lily:
    cmds:
      - home-manager switch --flake .#taiseiue@lily
  switch:leica:
    cmds:
      - home-manager switch --flake .#taiseiue@leica
  switch:cosmos:
    cmds:
      - home-manager switch --flake .#taiseiue@cosmos
  switch:linux:
    cmds:
      - home-manager switch --flake .#taiseiue@linux
  switch:local-darwin:
    cmds:
      - home-manager switch --flake .#taiseiue@local-darwin
  switch:mac:
    cmds:
      - task: switch:darwin
